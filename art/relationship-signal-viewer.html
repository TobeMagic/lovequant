<!DOCTYPE html>
<!--
    THIS IS A TEMPLATE THAT SHOULD BE USED EVERY TIME AND MODIFIED.
    WHAT TO KEEP:
    ✓ Overall structure (header, sidebar, main content)
    ✓ Anthropic branding (colors, fonts, layout)
    ✓ Seed navigation section (always include this)
    ✓ Self-contained artifact (everything inline)

    WHAT TO CREATIVELY EDIT:
    ✗ The p5.js algorithm (implement YOUR vision)
    ✗ The parameters (define what YOUR art needs)
    ✗ The UI controls (match YOUR parameters)

    Let your philosophy guide the implementation.
    The world is your oyster - be creative!
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Art Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Anthropic Brand Colors */
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Control Sections */
        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        /* Seed Controls */
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        /* Parameter Controls */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        /* Color Pickers */
        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        /* Buttons */
        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        /* Responsive - Stack on mobile */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Control Sidebar -->
        <div class="sidebar">
            <!-- Headers (CUSTOMIZE THIS FOR YOUR ART) -->
            <h1>Latency Bloom</h1>
            <div class="subtitle">A seeded signal field tuned for LoveQuant's relationship dashboard aesthetic. Think message delays, active windows, and emotional drift becoming visible.</div>

            <!-- Seed Section (ALWAYS KEEP THIS) -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <!-- Parameters Section (CUSTOMIZE THIS FOR YOUR ART) -->
            <div class="control-section">
                <h3>Parameters</h3>
                
                <!-- Signal Count -->
                <div class="control-group">
                    <label>Signal Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="1200" max="5200" step="200" value="2800" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">2800</span>
                    </div>
                </div>

                <!-- Drift Speed -->
                <div class="control-group">
                    <label>Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="flowSpeed" min="0.15" max="1.6" step="0.05" value="0.55" oninput="updateParam('flowSpeed', this.value)">
                        <span class="value-display" id="flowSpeed-value">0.55</span>
                    </div>
                </div>

                <!-- Field Grain -->
                <div class="control-group">
                    <label>Field Grain</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.002" max="0.018" step="0.001" value="0.007" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.007</span>
                    </div>
                </div>

                <!-- Bloom Radius -->
                <div class="control-group">
                    <label>Bloom Radius</label>
                    <div class="slider-container">
                        <input type="range" id="trailLength" min="30" max="160" step="2" value="84" oninput="updateParam('trailLength', this.value)">
                        <span class="value-display" id="trailLength-value">84</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section (OPTIONAL - CUSTOMIZE OR REMOVE) -->
            <div class="control-section">
                <h3>Colors</h3>
                
                <!-- Color 1 -->
                <div class="color-group">
                    <label>Pulse Coral</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#ff7a59" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#ff7a59</span>
                    </div>
                </div>

                <!-- Color 2 -->
                <div class="color-group">
                    <label>Relay Mint</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#96c7b7" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#96c7b7</span>
                    </div>
                </div>

                <!-- Color 3 -->
                <div class="color-group">
                    <label>Dust Plum</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#8b7288" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#8b7288</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section (ALWAYS KEEP THIS) -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button secondary" onclick="initializeSystem()">Regenerate</button>
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
                <div class="button-row" style="margin-top: 8px;">
                    <button class="button tertiary" onclick="downloadArtwork()">Download PNG</button>
                </div>
            </div>
        </div>

        <!-- Main Canvas Area -->
        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // GENERATIVE ART PARAMETERS - CUSTOMIZE FOR YOUR ALGORITHM
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 12345,
            particleCount: 2800,
            flowSpeed: 0.55,
            noiseScale: 0.007,
            trailLength: 84,
            colorPalette: ['#ff7a59', '#96c7b7', '#8b7288']
        };

        let defaultParams = {...params};
        let particles = [];
        let nodes = [];
        let frameFade = 8;

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            pixelDensity(1);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            particles = [];
            nodes = [];

            for (let i = 0; i < 5; i++) {
                const angle = map(i, 0, 5, 0, TAU) + random(-0.28, 0.28);
                const radius = 210 + i * 40 + random(-35, 35);
                nodes.push({
                    x: width / 2 + cos(angle) * radius,
                    y: height / 2 + sin(angle) * radius,
                    strength: random([-1, 1]) * random(0.7, 1.2),
                    phase: random(TAU),
                    wobble: random(0.0012, 0.0035)
                });
            }

            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle());
            }

            background(250, 249, 245);
        }

        function draw() {
            noStroke();
            fill(250, 249, 245, frameFade);
            rect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].show();
                particles[i].wrap();
            }

            drawSignalNodes();
        }

        class Particle {
            constructor() {
                this.reset(true);
            }

            reset(initial = false) {
                const spread = initial ? width : params.trailLength * 2.5;
                this.pos = createVector(random(width), random(height));
                this.prev = this.pos.copy();
                this.velocity = p5.Vector.random2D().mult(random(0.15, 0.65));
                this.pick = floor(random(3));
                this.alpha = random(18, 52);
                this.weight = random(0.35, 1.6);
                if (!initial) {
                    this.pos.x = constrain(this.pos.x + random(-spread, spread), 0, width);
                    this.pos.y = constrain(this.pos.y + random(-spread, spread), 0, height);
                    this.prev = this.pos.copy();
                }
            }

            fieldAt(point) {
                const noiseAngle = noise(point.x * params.noiseScale, point.y * params.noiseScale, frameCount * 0.002) * TAU * 2.2;
                let force = p5.Vector.fromAngle(noiseAngle).mult(params.flowSpeed);
                let center = createVector(width / 2, height / 2);
                let orbit = p5.Vector.sub(center, point);
                orbit.rotate(HALF_PI).setMag(0.15 + (params.trailLength / 160) * 0.55);
                force.add(orbit);

                for (let i = 0; i < nodes.length; i++) {
                    const node = nodes[i];
                    const wobbleX = sin(frameCount * node.wobble + node.phase) * 28;
                    const wobbleY = cos(frameCount * node.wobble + node.phase) * 28;
                    const target = createVector(node.x + wobbleX, node.y + wobbleY);
                    const delta = p5.Vector.sub(target, point);
                    const dist = max(18, delta.mag());
                    delta.setMag((node.strength * params.trailLength) / (dist * 16));
                    force.add(delta);
                }

                return force.limit(2.2);
            }

            update() {
                this.prev = this.pos.copy();
                let acceleration = this.fieldAt(this.pos);
                this.velocity.add(acceleration).limit(2.4);
                this.pos.add(this.velocity);
            }

            wrap() {
                if (this.pos.x < -8 || this.pos.x > width + 8 || this.pos.y < -8 || this.pos.y > height + 8) {
                    this.reset();
                }
            }

            show() {
                const colorA = color(params.colorPalette[this.pick % params.colorPalette.length]);
                const speedTone = map(this.velocity.mag(), 0, 2.4, 12, 70);
                colorA.setAlpha(this.alpha + speedTone);
                stroke(colorA);
                strokeWeight(this.weight);
                line(this.prev.x, this.prev.y, this.pos.x, this.pos.y);
            }
        }

        function drawSignalNodes() {
            noStroke();
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                const wobbleX = sin(frameCount * node.wobble + node.phase) * 28;
                const wobbleY = cos(frameCount * node.wobble + node.phase) * 28;
                const x = node.x + wobbleX;
                const y = node.y + wobbleY;
                const bloom = color(params.colorPalette[(i + 1) % params.colorPalette.length]);
                fill(red(bloom), green(bloom), blue(bloom), 22);
                circle(x, y, params.trailLength * 1.08);
                fill(red(bloom), green(bloom), blue(bloom), 64);
                circle(x, y, 10 + i * 2);
            }
        }

        function updateParam(paramName, value) {
            const numericValue = parseFloat(value);
            params[paramName] = numericValue;
            document.getElementById(`${paramName}-value`).textContent = numericValue;
            initializeSystem();
        }

        function updateColor(colorId, value) {
            const index = parseInt(colorId.replace('color', ''), 10) - 1;
            params.colorPalette[index] = value;
            document.getElementById(`${colorId}-value`).textContent = value;
            initializeSystem();
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS - ALWAYS KEEP THESE
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                // Reset to current seed if invalid
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function downloadArtwork() {
            saveCanvas(`latency-bloom-${params.seed}`, 'png');
        }

        function resetParameters() {
            params = {...defaultParams};
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('flowSpeed').value = params.flowSpeed;
            document.getElementById('flowSpeed-value').textContent = params.flowSpeed;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('trailLength').value = params.trailLength;
            document.getElementById('trailLength-value').textContent = params.trailLength;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            
            updateSeedDisplay();
            initializeSystem();
        }

        // Initialize UI on load
        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
